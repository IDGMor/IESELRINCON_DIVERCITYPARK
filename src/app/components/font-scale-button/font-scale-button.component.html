<!-- Referencia de estilo: botón del header del home (.header-button + .header-icon) -->
<ion-button
  fill="clear"
  class="header-button font-scale-btn"
  [attr.aria-label]="label"
  [title]="label"
  (click)="onClick()">
  <ion-icon
    name="text"
    aria-hidden="true"
    class="header-icon">
  </ion-icon>
</ion-button>
